services:
  nginx:
    image: ${NGINX_IMAGE}
    container_name: mlops-nginx
    depends_on:
      mlflow:
        condition: service_started
      oauth2-proxy:
        condition: service_started
      keycloak:
        condition: service_started
    ports:
      - "${NGINX_HTTP_BIND}:${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_BIND}:${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERTS_DIR}/${TLS_CERT_FILE}:/etc/nginx/certs/tls.crt:ro
      - ${TLS_CERTS_DIR}/${TLS_KEY_FILE}:/etc/nginx/certs/tls.key:ro
    restart: unless-stopped
    networks: [mlops]
