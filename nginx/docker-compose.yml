services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      airflow-webserver:
        condition: service_healthy
      mlflow:
        condition: service_started
      mlflow-admin:
        condition: service_started
      rustfs:
        condition: service_started
    ports:
      - "${NGINX_PORT_BIND}:${NGINX_PORT}:80"
    environment:
      PUBLIC_FQDN: ${PUBLIC_FQDN}
      MLFLOW_BASE_PATH: ${MLFLOW_BASE_PATH}
      MLFLOW_ADMIN_BASE_PATH: ${MLFLOW_ADMIN_BASE_PATH}
      AIRFLOW_BASE_PATH: ${AIRFLOW_BASE_PATH}
      RUSTFS_BASE_PATH: ${RUSTFS_BASE_PATH}
      MLFLOW_PORT: ${MLFLOW_PORT}
      MLFLOW_ADMIN_PORT: ${MLFLOW_ADMIN_PORT}
      AIRFLOW_PORT: ${AIRFLOW_PORT}
      RUSTFS_PORT: ${RUSTFS_PORT}
      RUSTFS_CONSOLE_PORT: ${RUSTFS_CONSOLE_PORT}
    volumes:
      - ./default.conf.template:/etc/nginx/templates/default.conf.template:ro
    restart: unless-stopped
    networks: [mlops]
