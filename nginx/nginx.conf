worker_processes auto;

events {
  worker_connections 1024;
}

http {
  server_tokens off;
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  keepalive_timeout 65;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream mlflow_upstream {
    server mlflow:5000;
  }

  upstream oauth2_proxy_upstream {
    server oauth2-proxy:4180;
  }

  upstream keycloak_upstream {
    server keycloak:8080;
  }

  server {
    listen 80;
    listen [::]:80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    location = / {
      return 302 /mlflow/;
    }

    location = /mlflow {
      return 302 /mlflow/;
    }

    location = /oauth2/auth {
      internal;
      proxy_pass http://oauth2_proxy_upstream/oauth2/auth;
      proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
      proxy_set_header X-Original-URI $request_uri;
      proxy_set_header X-Scheme $scheme;
      proxy_set_header Content-Length "";
      proxy_pass_request_body off;
    }

    location /oauth2/ {
      proxy_pass http://oauth2_proxy_upstream;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /auth/ {
      proxy_pass http://keycloak_upstream/auth/;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
    }

    location /mlflow/ {
      auth_request /oauth2/auth;
      error_page 401 = /oauth2/sign_in?rd=$escaped_request_uri;

      auth_request_set $auth_user $upstream_http_x_auth_request_user;
      auth_request_set $auth_email $upstream_http_x_auth_request_email;
      auth_request_set $auth_groups $upstream_http_x_auth_request_groups;

      set $requires_write_role 0;
      if ($request_method ~* "^(POST|PUT|PATCH|DELETE)$") {
        set $requires_write_role 1;
      }

      if ($auth_groups !~* "mlops-(viewer|editor|admin)") {
        return 403;
      }

      if ($requires_write_role$auth_groups ~* "^1(?!.*mlops-(editor|admin)).*$") {
        return 403;
      }

      proxy_set_header X-Forwarded-User $auth_user;
      proxy_set_header X-Forwarded-Email $auth_email;
      proxy_set_header X-Forwarded-Groups $auth_groups;
      proxy_set_header X-Forwarded-Prefix /mlflow;

      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;

      proxy_pass http://mlflow_upstream/;
    }
  }
}
