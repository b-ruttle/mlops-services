services:
  postgres:
    image: ${POSTGRES_IMAGE}
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks: [ mlops ]

  postgres-init:
    image: ${POSTGRES_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      MLFLOW_AUTH_POSTGRES_DB: ${MLFLOW_AUTH_POSTGRES_DB:-mlflow_auth}
      FEAST_POSTGRES_DB: ${FEAST_POSTGRES_DB:-feast}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts/init-extra-dbs.sh:/scripts/init-extra-dbs.sh:ro
    entrypoint: ["/bin/sh", "/scripts/init-extra-dbs.sh"]
    restart: "no"
    networks: [mlops]
