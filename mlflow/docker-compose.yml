services:
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE}
    container_name: mlflow-server
    depends_on:
      postgres:
        condition: service_healthy
      postgres-init:
        condition: service_completed_successfully
      rustfs_init:
        condition: service_completed_successfully
    expose:
      - "${MLFLOW_PORT}"
    environment:
      MLFLOW_S3_ENDPOINT_URL: "http://rustfs:${RUSTFS_PORT}"
      AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      MLFLOW_BIND_HOST: ${MLFLOW_BIND_HOST}
      MLFLOW_PORT: ${MLFLOW_PORT}
      MLFLOW_ARTIFACT_BUCKET: ${MLFLOW_ARTIFACT_BUCKET}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      MLFLOW_AUTH_DATABASE_URI: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${MLFLOW_AUTH_POSTGRES_DB}
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY:?Set MLFLOW_FLASK_SERVER_SECRET_KEY in env/secrets.env}
      MLFLOW_AUTH_ADMIN_USERNAME: ${MLFLOW_AUTH_ADMIN_USERNAME:-admin}
      MLFLOW_AUTH_ADMIN_PASSWORD: ${MLFLOW_AUTH_ADMIN_PASSWORD:?Set MLFLOW_AUTH_ADMIN_PASSWORD in env/secrets.env}
      MLFLOW_AUTH_DEFAULT_PERMISSION: ${MLFLOW_AUTH_DEFAULT_PERMISSION:-READ}
    command: /usr/local/bin/start-mlflow.sh
    restart: unless-stopped
    networks: [mlops]
