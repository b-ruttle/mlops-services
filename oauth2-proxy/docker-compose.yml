services:
  oauth2-proxy:
    image: ${OAUTH2_PROXY_IMAGE}
    container_name: mlops-oauth2-proxy
    depends_on:
      keycloak:
        condition: service_started
    command:
      - --config=/etc/oauth2-proxy/oauth2-proxy.cfg
    environment:
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:${OAUTH2_PROXY_PORT}"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://${PUBLIC_FQDN}/auth/realms/mlops"
      OAUTH2_PROXY_REDIRECT_URL: "https://${PUBLIC_FQDN}/oauth2/callback"
      OAUTH2_PROXY_CLIENT_ID: ${OAUTH2_PROXY_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${OAUTH2_PROXY_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_WHITELIST_DOMAINS: ".${PUBLIC_FQDN}"
    expose:
      - "${OAUTH2_PROXY_PORT}"
    volumes:
      - ./oauth2-proxy/oauth2-proxy.cfg:/etc/oauth2-proxy/oauth2-proxy.cfg:ro
    restart: unless-stopped
    networks: [mlops]
