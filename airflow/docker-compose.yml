x-airflow-common-env: &airflow-common-env
  AIRFLOW_HOME: /opt/airflow
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?Set AIRFLOW_FERNET_KEY in env/secrets.env}
  AIRFLOW__CORE__LOAD_EXAMPLES: "False"
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${AIRFLOW_POSTGRES_DB}
  AIRFLOW__WEBSERVER__BASE_URL: http://${PUBLIC_FQDN}:${NGINX_PORT}${AIRFLOW_BASE_PATH}
  AIRFLOW__WEBSERVER__ENABLE_PROXY_FIX: "True"
  AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-change_me_airflow_web_secret_key}
  AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: "True"
  MLOPS_NETWORK: ${MLOPS_NETWORK}
  MLOPS_EXAMPLES_HOST_DIR: ${MLOPS_EXAMPLES_DIR:?Set MLOPS_EXAMPLES_DIR to your mlops-examples checkout}
  PUBLIC_FQDN: ${PUBLIC_FQDN}
  MLFLOW_BASE_PATH: ${MLFLOW_BASE_PATH}
  MLFLOW_TRACKING_URI: http://mlflow:${MLFLOW_PORT}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: ${POSTGRES_PORT}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  AWS_ACCESS_KEY_ID: ${RUSTFS_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${RUSTFS_SECRET_KEY}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
  MLFLOW_AUTH_ADMIN_USERNAME: ${MLFLOW_AUTH_ADMIN_USERNAME:-admin}
  MLFLOW_AUTH_ADMIN_PASSWORD: ${MLFLOW_AUTH_ADMIN_PASSWORD:?Set MLFLOW_AUTH_ADMIN_PASSWORD in env/secrets.env}
  MLFLOW_TRACKING_USERNAME: ${MLFLOW_TRACKING_USERNAME:-}
  MLFLOW_TRACKING_PASSWORD: ${MLFLOW_TRACKING_PASSWORD:-}

x-airflow-common-volumes: &airflow-common-volumes
  - ${MLOPS_EXAMPLES_DIR:?Set MLOPS_EXAMPLES_DIR to your mlops-examples checkout}/dags:/opt/airflow/dags
  - ${MLOPS_EXAMPLES_DIR:?Set MLOPS_EXAMPLES_DIR to your mlops-examples checkout}:/opt/mlops-examples
  - /var/run/docker.sock:/var/run/docker.sock
  - airflow_logs:/opt/airflow/logs
  - airflow_plugins:/opt/airflow/plugins

services:
  airflow-db-init:
    image: ${POSTGRES_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      AIRFLOW_POSTGRES_DB: ${AIRFLOW_POSTGRES_DB:-airflow}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts/create-postgres-db.sh:/scripts/create-postgres-db.sh:ro
    entrypoint: [ "/bin/sh", "/scripts/create-postgres-db.sh" ]
    restart: "no"
    networks: [ mlops ]

  airflow-init:
    image: ${AIRFLOW_IMAGE}
    depends_on:
      airflow-db-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    environment:
      <<: *airflow-common-env
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-admin}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-change_me_airflow_admin_password}
      AIRFLOW_ADMIN_FIRSTNAME: ${AIRFLOW_ADMIN_FIRSTNAME:-Airflow}
      AIRFLOW_ADMIN_LASTNAME: ${AIRFLOW_ADMIN_LASTNAME:-Admin}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-airflow-admin@example.local}
    volumes:
      - ./scripts/init-airflow.sh:/scripts/init-airflow.sh:ro
      - ${MLOPS_EXAMPLES_DIR:?Set MLOPS_EXAMPLES_DIR to your mlops-examples checkout}/dags:/opt/airflow/dags
      - ${MLOPS_EXAMPLES_DIR:?Set MLOPS_EXAMPLES_DIR to your mlops-examples checkout}:/opt/mlops-examples
      - airflow_logs:/opt/airflow/logs
      - airflow_plugins:/opt/airflow/plugins
    entrypoint: [ "/bin/bash", "/scripts/init-airflow.sh" ]
    restart: "no"
    networks: [ mlops ]

  airflow-webserver:
    image: ${AIRFLOW_IMAGE}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "1001"
    expose:
      - "${AIRFLOW_PORT}"
    environment:
      <<: *airflow-common-env
    command: [ "airflow", "webserver", "--port", "${AIRFLOW_PORT}" ]
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:${AIRFLOW_PORT}${AIRFLOW_BASE_PATH}/health', timeout=5).getcode() == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes: *airflow-common-volumes
    restart: unless-stopped
    networks: [ mlops ]

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    user: "${AIRFLOW_UID:-50000}:0"
    group_add:
      - "1001"
    environment:
      <<: *airflow-common-env
    command: [ "airflow", "scheduler" ]
    volumes: *airflow-common-volumes
    restart: unless-stopped
    networks: [ mlops ]

volumes:
  airflow_logs:
  airflow_plugins:
